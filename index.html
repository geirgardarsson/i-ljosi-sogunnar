<!doctype html>
<html lang="is">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Þættir Í ljósi sögunnar á heimskorti og tímalínu" />
    <title>Í ljósi sögunnar · kort og tímalína</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Í ljósi sögunnar<span class="sub"> · kort</span></h1>
        <input id="search" type="search" placeholder="Leita…" aria-label="Leita í þáttum" autocomplete="off" />
        <select id="era-preset" aria-label="Tímabil"></select>
        <button id="view-toggle" aria-pressed="false">Listi</button>
        <button id="theme-toggle" aria-label="Skipta á milli ljóss og dökks hams">◐</button>
      </header>
      <main>
        <div id="map" aria-label="Kort af sögustöðum þáttanna"></div>
        <section id="list" class="list-view" hidden aria-label="Þáttalisti"></section>
        <aside id="panel" class="panel" hidden aria-label="Þáttaspjald"></aside>
      </main>
      <footer id="timeline-band" aria-label="Tímalína">
        <svg id="timeline"></svg>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
